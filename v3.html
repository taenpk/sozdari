<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invite: Max & Kira</title>
    <!-- Шрифты: Space Grotesk (акцентный) и Manrope (основной) -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- ТЕМА: URBAN DIGITAL --- */
        :root {
            --accent-color: #6366f1; /* Индиго */
            --accent-hover: #4f46e5;
            --text-main: #111827;    /* Почти черный */
            --text-sec: #6b7280;     /* Серый */
            --bg-card: rgba(255, 255, 255, 0.85);
            
            --font-head: 'Space Grotesk', sans-serif;
            --font-body: 'Manrope', sans-serif;
            
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            /* Анимированный градиентный фон */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            
            font-family: var(--font-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Основная карточка */
        .modern-card {
            position: relative;
            width: 90%;
            max-width: 380px;
            min-height: 620px;
            /* Скругленные углы в стиле Apple */
            border-radius: 40px;
            padding: 40px 30px;
            
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-card);
            
            display: flex;
            flex-direction: column;
            text-align: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Типографика */
        h1 {
            font-family: var(--font-head);
            font-size: 42px;
            line-height: 1;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #111827, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-sec);
            margin-bottom: 30px;
        }

        h2 {
            font-family: var(--font-head);
            font-size: 24px;
            margin-bottom: 25px;
        }

        /* Прогресс бар (минималистичные точки) */
        .dots-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .dot {
            width: 8px; height: 8px;
            background: #e5e7eb;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .dot.active {
            background: var(--accent-color);
            transform: scale(1.3);
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
            
            /* Стиль "Soft UI" */
            background: #fff;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f3f4f6;
        }

        .btn:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn.primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .btn.primary:hover { background: var(--accent-hover); }

        .btn.correct { background: #10b981 !important; color: white !important; }
        .btn.wrong { background: #ef4444 !important; color: white !important; }
        .btn.disabled { opacity: 0.6; pointer-events: none; }

        /* Экраны */
        .screen {
            display: none;
            opacity: 0;
            /* Эффект зума при появлении */
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
        }
        .screen.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* Детали финала */
        .details-list {
            text-align: left;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
            margin-top: 10px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .detail-row:last-child { border-bottom: none; }
        
        .d-label { font-size: 13px; color: var(--text-sec); font-weight: 500; }
        .d-val { font-size: 15px; font-weight: 700; color: var(--text-main); text-align: right; }

        /* Карта и контакты */
        .map-wrapper {
            margin-top: 15px;
            border-radius: 16px;
            overflow: hidden;
            display: none; /* Скрыто по умолчанию */
        }
        
        .map-style {
            background: #e5e7eb;
            height: 100px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        
        .contact-btn {
            background: #f0fdf4;
            color: #166534;
            margin-top: 15px;
            border: 1px solid #bbf7d0;
        }

        /* Утилиты */
        .shake { animation: shake 0.4s linear; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

    </style>
</head>
<body>

    <div class="modern-card">
        
        <!-- ЭКРАН 1: Интро -->
        <div id="screen-intro" class="screen active">
            <span class="subtitle">14.09.2025</span>
            <h1>Макс<br>& Кира</h1>
            <p>Презентация нашей новой семьи.<br>Доступ по приглашениям после верификации.</p>
            <button class="btn primary" onclick="startQuiz()">Пройти верификацию</button>
        </div>

        <!-- ЭКРАН 2: Квиз -->
        <div id="screen-quiz" class="screen" style="justify-content: flex-start; padding-top: 20px;">
            <div class="dots-progress">
                <div class="dot active" id="dot-0"></div>
                <div class="dot" id="dot-1"></div>
                <div class="dot" id="dot-2"></div>
            </div>
            
            <h2 id="question-text" style="min-height: 80px; display: flex; align-items: center; justify-content: center;">...</h2>
            
            <div id="answers-container" style="margin-top: 20px;"></div>
        </div>

        <!-- ЭКРАН 3: Финал -->
        <div id="screen-final" class="screen" style="justify-content: flex-start; padding-top: 10px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 40px; margin-bottom: 10px;">🎉</div>
                <h1 style="font-size: 32px;">Вы в списке!</h1>
                <p style="margin-bottom: 10px; font-size: 14px;">Ждем тебя на главной вечеринке года.</p>
            </div>

            <div class="details-list">
                <div class="detail-row">
                    <span class="d-label">Дата</span>
                    <span class="d-val">14 Сентября 17:00</span>
                </div>
                <div class="detail-row">
                    <span class="d-label">Локация</span>
                    <span class="d-val">Лофт "Ферма"</span>
                </div>
                <div class="detail-row">
                    <span class="d-label">Дресс-код</span>
                    <span class="d-val">Smart Casual</span>
                </div>
            </div>

            <button class="btn" style="margin-top: 15px; background: #f3f4f6;" onclick="toggleMap()">📍 Показать карту</button>
            
            <div id="map-area" class="map-wrapper">
                <div class="map-style">
                    <!-- Схематичная карта -->
                    <div style="position: absolute; width: 100%; height: 2px; background: #9ca3af; top: 50%;"></div>
                    <div style="position: absolute; height: 100%; width: 2px; background: #9ca3af; left: 60%;"></div>
                    <div style="z-index: 2; font-size: 24px; color: var(--accent-color); padding-bottom: 20px;">📍</div>
                </div>
                <div style="padding: 15px; background: #f9fafb; text-align: left;">
                    <span style="font-size: 12px; color: #6b7280; display: block;">Адрес:</span>
                    <span style="font-size: 14px; font-weight: 600; display: block; margin-bottom: 5px;">Москва, Нижний Сусальный пер. 5</span>
                    <a href="#" style="font-size: 12px; color: var(--accent-color); text-decoration: none;">Открыть в навигаторе →</a>
                </div>
            </div>

            <button class="btn contact-btn" onclick="alert('Открываем Telegram...')">Написать координатору</button>
        </div>

    </div>

    <script>
        const questions = [
            {
                text: "Что мы делаем чаще всего вечером?",
                answers: [
                    { text: "Готовим ужин", correct: false },
                    { text: "Спорим из-за фильма", correct: false },
                    { text: "Заказываем еду", correct: true }
                ]
            },
            {
                text: "Кто первым идет мириться?",
                answers: [
                    { text: "Макс", correct: true },
                    { text: "Кира", correct: false },
                    { text: "Кот (от голода)", correct: false }
                ]
            },
            {
                text: "Главный напиток нашей свадьбы?",
                answers: [
                    { text: "Чай с ромашкой", correct: false },
                    { text: "Игристое", correct: true },
                    { text: "Минералка", correct: false }
                ]
            }
        ];

        let currentIdx = 0;
        let isProcessing = false;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz() {
            currentIdx = 0;
            updateDots();
            renderQuestion();
            showScreen('screen-quiz');
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentIdx);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.text;
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            q.answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ans.text;
                btn.onclick = () => checkAnswer(btn, ans.correct);
                container.appendChild(btn);
            });
            updateDots();
        }

        function checkAnswer(btn, isCorrect) {
            if (isProcessing) return;
            isProcessing = true;
            
            const btns = document.querySelectorAll('#answers-container .btn');
            btns.forEach(b => b.classList.add('disabled'));

            if (isCorrect) {
                btn.classList.add('correct');
                setTimeout(() => {
                    currentIdx++;
                    if (currentIdx < questions.length) {
                        renderQuestion();
                        isProcessing = false;
                    } else {
                        finishQuiz();
                    }
                }, 600);
            } else {
                btn.classList.add('wrong', 'shake');
                setTimeout(() => {
                    btn.classList.remove('wrong', 'shake');
                    btns.forEach(b => b.classList.remove('disabled'));
                    isProcessing = false;
                }, 500);
            }
        }

        function finishQuiz() {
            showScreen('screen-final');
            setTimeout(fireModernConfetti, 300);
        }

        function toggleMap() {
            const mapArea = document.getElementById('map-area');
            if (mapArea.style.display === 'block') {
                mapArea.style.display = 'none';
            } else {
                mapArea.style.display = 'block';
            }
        }

        function fireModernConfetti() {
            // Конфетти для этой темы: яркие цвета (циан, маджента, индиго)
            const colors = ['#6366f1', '#ec4899', '#06b6d4'];
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: colors
            });
        }
    </script>
</body>
</html>
